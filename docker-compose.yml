version: "3.9"

services:

  # ── Base de données PostgreSQL ──────────────────────────
  db:
    image: postgres:15-alpine
    container_name: ats_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-ats_db}
      POSTGRES_USER:     ${POSTGRES_USER:-ats_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ats_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ats_user}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend FastAPI ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ats_backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - ./backend:/app            # hot-reload : vos modifications sont appliquées immédiatement
      - cv_storage:/app/storage/cvs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend React ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ats_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules         # garde node_modules dans le container
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
  cv_storage:
